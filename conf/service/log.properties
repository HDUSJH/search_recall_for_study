log4cplus.logger.dragonfly=TRACE, AA
log4cplus.appender.AA=log4cplus::AsyncAppender
log4cplus.appender.AA.QueueLimit=10000
log4cplus.appender.AA.Appender=log4cplus::DailyRollingFileAppender
log4cplus.appender.AA.Appender.Schedule=HOURLY
log4cplus.appender.AA.Appender.DatePattern=%Y-%m-%d-%H
log4cplus.appender.AA.Appender.File=/apps/logs/log_receiver/tesseract/tesseract_app.log
log4cplus.appender.AA.Appender.CreateDirs=true
log4cplus.appender.AA.Appender.Append=true
log4cplus.appender.AA.Appender.layout=log4cplus::PatternLayout  
log4cplus.appender.AA.Appender.layout.ConversionPattern=[%D{%Y-%m-%d %H:%M:%S.%q}] [%p] %m%n

log4cplus.logger.kafka=TRACE, BB
log4cplus.appender.BB=log4cplus::AsyncAppender
log4cplus.appender.BB.QueueLimit=10000
log4cplus.appender.BB.Appender=log4cplus::DailyRollingFileAppender
log4cplus.appender.BB.Appender.Schedule=HOURLY
log4cplus.appender.BB.Appender.DatePattern=%Y-%m-%d-%H
log4cplus.appender.BB.Appender.File=/apps/logs/log_receiver/tesseract_kafka.log
log4cplus.appender.BB.Appender.CreateDirs=true
log4cplus.appender.BB.Appender.Append=true
log4cplus.appender.BB.Appender.layout=log4cplus::PatternLayout  
log4cplus.appender.BB.Appender.layout.ConversionPattern=[%D{%Y-%m-%d %H:%M:%S.%q}] [%p] %m%n
